name: signoz
networks:
  signoz-network:
    external: true
    name: signoz-net
services:
  ingester:
    command:
    - -c
    - |
      /signoz-otel-collector migrate sync check &&
      /signoz-otel-collector --config=/etc/otel-collector-config.yaml --manager-config=/etc/opamp-config.yaml --copy-path=/var/tmp/collector-config.yaml
    deploy:
      restart_policy:
        condition: on-failure
    entrypoint:
    - /bin/sh
    environment:
    - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://signoz-telemetrystore-clickhouse-0-0:9000
    - LOW_CARDINAL_EXCEPTION_GROUPING=false
    - OTEL_RESOURCE_ATTRIBUTES=host.name=signoz-host,os.type=linux
    - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
    - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
    - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    image: signoz/signoz-otel-collector:v0.144.5
    networks:
      signoz-network:
        aliases:
        - signoz-ingester
    ports:
    - 4317:4317
    - 4318:4318
    - 8889:8889
    volumes:
    - ./ingester/ingester.yaml:/etc/otel-collector-config.yaml:ro
    - ./ingester/opamp.yaml:/etc/opamp-config.yaml:ro
    - /app/secrets/uptime_kuma_api_key:/app/secrets/uptime_kuma_api_key:ro
  signoz-signoz-0:
    container_name: signoz-signoz-0
    deploy:
      restart_policy:
        condition: on-failure
    environment:
    - SIGNOZ_ALERTMANAGER_PROVIDER=signoz
    - SIGNOZ_SQLSTORE_PROVIDER=sqlite
    - SIGNOZ_SQLSTORE_SQLITE_PATH=/var/lib/signoz/signoz.db
    - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://signoz-telemetrystore-clickhouse-0-0:9000
    - SIGNOZ_TELEMETRYSTORE_PROVIDER=clickhouse
    - SIGNOZ_TOKENIZER_JWT_SECRET=secret
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 60s
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:8080/api/v1/health
      timeout: 10s
    image: signoz/signoz:v0.130.1
    networks:
    - signoz-network
    ports:
    - 8080:8080
    volumes:
    - signoz-metastore-sqlite-0-data:/var/lib/signoz
  signoz-telemetrykeeper-zookeeper-0:
    container_name: signoz-telemetrykeeper-zookeeper-0
    environment:
    - ZOO_SERVER_ID=1
    - ALLOW_ANONYMOUS_LOGIN=yes
    - ZOO_AUTOPURGE_INTERVAL=1
    - ZOO_ENABLE_PROMETHEUS_METRICS=yes
    - ZOO_PROMETHEUS_METRICS_PORT_NUMBER=9141
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 40s
      test:
      - CMD-SHELL
      - curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null
      timeout: 10s
    image: signoz/zookeeper:3.7.1
    networks:
    - signoz-network
    user: root
    volumes:
    - signoz-telemetrykeeper-0-data:/bitnami/zookeeper
  signoz-telemetrystore-clickhouse-0-0:
    container_name: signoz-telemetrystore-clickhouse-0-0
    depends_on:
      signoz-telemetrykeeper-zookeeper-0:
        condition: service_healthy
      signoz-telemetrystore-clickhouse-user-scripts:
        condition: service_completed_successfully
    environment:
    - CLICKHOUSE_SKIP_USER_SETUP=1
    - CLICKHOUSE_CONFIG=/etc/clickhouse-server/config.yaml
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 40s
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:8123/ping
      timeout: 10s
    image: clickhouse/clickhouse-server:25.5.6
    networks:
    - signoz-network
    ports:
    - 9000:9000
    - 8123:8123
    - 9181:9181
    volumes:
    - signoz-telemetrystore-0-0-data:/var/lib/clickhouse
    - signoz-telemetrystore-user-scripts:/var/lib/clickhouse/user_scripts:ro
    - ./telemetrystore/clickhouse/config-0-0.yaml:/etc/clickhouse-server/config.yaml:ro
    - ./telemetrystore/clickhouse/functions.yaml:/etc/clickhouse-server/functions.yaml:ro
  signoz-telemetrystore-clickhouse-user-scripts:
    command:
    - bash
    - -c
    - |-
      version="v0.0.1"
      node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
      node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
      echo "Fetching histogram-binary for $${node_os}/$${node_arch}"
      cd /tmp
      wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
      tar -xvzf histogram-quantile.tar.gz
      mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    container_name: signoz-telemetrystore-clickhouse-user-scripts
    image: clickhouse/clickhouse-server:25.5.6
    networks:
    - signoz-network
    volumes:
    - signoz-telemetrystore-user-scripts:/var/lib/clickhouse/user_scripts
  signoz-telemetrystore-migrator:
    command:
    - -c
    - |
      /signoz-otel-collector migrate ready &&
      /signoz-otel-collector migrate bootstrap &&
      /signoz-otel-collector migrate sync up &&
      /signoz-otel-collector migrate async up
    container_name: signoz-telemetrystore-migrator
    entrypoint:
    - /bin/sh
    environment:
    - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://signoz-telemetrystore-clickhouse-0-0:9000
    - LOW_CARDINAL_EXCEPTION_GROUPING=false
    - OTEL_RESOURCE_ATTRIBUTES=host.name=signoz-host,os.type=linux
    - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
    - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
    - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    image: signoz/signoz-otel-collector:v0.144.5
    networks:
    - signoz-network
volumes:
  signoz-metastore-sqlite-0-data:
    name: signoz-sqlite
  signoz-telemetrykeeper-0-data:
    name: signoz-zookeeper-1
  signoz-telemetrystore-0-0-data:
    name: signoz-clickhouse
  signoz-telemetrystore-user-scripts:
    name: signoz-telemetrystore-user-scripts
